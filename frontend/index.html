<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing News Reader</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Top Navigation for Mobile -->
        <nav class="topnav" id="topnav">
            <div class="container-topnav">
                <button class="hamburger" id="openSidebar" aria-label="Open company/filter menu">☰</button>
                <span class="nav-title">📰 Marketing News Reader</span>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
            </div>
        </nav>
        <header class="header">
            <div class="container">
                <h1>📰 Marketing News Reader</h1>
                <p class="subtitle">Real-time news aggregation for 20 major companies</p>
            </div>
        </header>
        <!-- Sidebar and Overlay for mobile navigation -->
        <aside class="sidebar" id="sidebar">
            <button class="close-sidebar" id="closeSidebar" aria-label="Close menu">&times;</button>
            <div class="sidebar-content">
                <h3>Companies</h3>
                <div class="company-filters" id="companyFilters"></div>
                <h3 style="margin-top: 30px;">Filters</h3>
                <div class="filter-section">
                    <label>Date Range</label>
                    <input type="date" id="startDate">
                    <input type="date" id="endDate">
                </div>
                <div class="filter-section">
                    <label>Search</label>
                    <input type="text" id="searchInput" placeholder="Search news...">
                </div>
                <div class="filter-section">
                    <button id="filterBtn" class="btn btn-primary">Apply Filters</button>
                    <button id="resetBtn" class="btn btn-secondary">Reset</button>
                </div>
                <div class="filter-section">
                    <button id="refreshBtn" class="btn btn-refresh floating-refresh">🔄 Refresh</button>
                </div>
            </div>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <main class="main-content">
            <div class="container">
                <div class="stats" id="stats">
                    <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Total Articles</div></div>
                    <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Companies</div></div>
                    <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Last Updated</div></div>
                </div>
                <div class="news-container">
                    <div id="newsList" class="news-list"></div>
                    <div id="loadingSpinner" class="loading" style="display: none;"><div class="spinner"></div><p>Loading news...</p></div>
                    <div id="emptyState" class="empty-state" style="display: none;"><p>No articles found. Try adjusting your filters.</p></div>
                </div>
            </div>
        </main>
    </div>
    <div id="articleModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
