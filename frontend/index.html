<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketFeed | Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Top Navigation Bar -->
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-left">
                    <span class="logo">🚀 MarketFeed</span>
                </div>
                
                <div class="nav-center">
                    <div class="company-dropdown">
                        <button class="dropbtn" id="companyDropdownBtn">
                            <span>Select Companies</span>
                            <i class="chevron-down"></i>
                        </button>
                        <div class="dropdown-content" id="companyFilters">
                            <!-- Company checkboxes will be injected here -->
                        </div>
                    </div>
                </div>

                <div class="nav-right">
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Search news...">
                    </div>
                    <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">🌙</button>
                    <button id="refreshBtn" class="refresh-icon-btn" title="Refresh news">🔄</button>
                </div>
            </div>
        </nav>

        <!-- Secondary Filter Bar -->
        <div class="filter-bar">
            <div class="nav-container">
                <div class="date-filters">
                    <div class="date-input-group">
                        <label for="startDate">From:</label>
                        <input type="date" id="startDate">
                    </div>
                    <div class="date-input-group">
                        <label for="endDate">To:</label>
                        <input type="date" id="endDate">
                    </div>
                </div>
                <div class="quick-stats" id="stats">
                    <span class="stat-item"><strong id="totalArticles">-</strong> Articles</span>
                    <span class="stat-item"><strong id="totalCompanies">-</strong> Companies</span>
                    <span class="stat-item">Updated: <span id="lastUpdated">-</span></span>
                </div>
                <div class="filter-actions">
                    <button id="resetBtn" class="btn-text">Reset Filters</button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="nav-container">
                <div class="news-container">
                    <div id="newsList" class="news-list"></div>
                    
                    <!-- Loading State -->
                    <div id="loadingSpinner" class="loading" style="display: none;">
                        <div class="spinner"></div>
                        <p>Aggregating latest updates...</p>
                    </div>

                    <!-- Empty State -->
                    <div id="emptyState" class="empty-state" style="display: none;">
                        <div class="empty-icon">📭</div>
                        <h3>No News Found</h3>
                        <p>Try adjusting your company selection or date range.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Article Detail Modal -->
    <div id="articleModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
